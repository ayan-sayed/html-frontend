<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            color: #000000
        }
        td, th {
            border: 1px solid black;
            padding:  10px;
        }
        tr:nth-child(even){
            background-color: #414141;
        }
    </style>
</head>
<body>
    <table style="width: 100%;"><!-- styling can be also done in the attribute -->
        <colgroup><!--the colgroup makes a group of columns so if any styling is applied it affects both the columns-->
            <col span="2" style="background-color: chartreuse;"/>
        </colgroup><!--But this approach is not considered as now the browers are dropping this way of uniting columns -->
        <tr>
            <th>Country</th>
            <th>Country CODE </th>
            <th>Email</th>
        </tr>
        <tr>
            <td>India </td>
            <td>IN </td>
            <td>india@google.com</td>
        </tr>
        <tr>
            <td>United State of America</td>
            <td>USA</td>
            <td>usa@google.com</td>
        </tr>
        <tr>
            <td>Japan</td>
            <td>JP</td>
            <td>japan@google.com</td>
        </tr>
        <tr>
            <td>China</td>
            <td>CN</td>
            <td>china@google.com</td>
        </tr>
    </table>
    <Br></Br>
    <table style="width: 50%;"><!-- tables can be made in any layout according to you preference -->
        <tr>
            <th colspan="2">Country</th><!--the colspan allows a single cell to occupy multiple adjacent cells-->
            <td>India</td>
            <td>Japan</td>
        </tr>
        <tr>
            <th>Code</th>
            <td>IN</td>
            <td>JP</td>
        </tr>
    </table>
</body>
</html>
